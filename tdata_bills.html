<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>T Data Connect · Pay Electricity Bill</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f4f7fc;
      padding: 20px 16px 40px;
    }

    .app-container {
      max-width: 500px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 20px 20px 12px;
      background: linear-gradient(135deg, #0b2b3b 0%, #144d5e 100%);
      color: white;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .back-btn {
      background: rgba(255,255,255,0.2);
      width: 38px;
      height: 38px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .back-btn:active {
      background: rgba(255,255,255,0.35);
      transform: scale(0.94);
    }

    .header h2 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .wallet-chip {
      background: rgba(255,255,255,0.15);
      border-radius: 60px;
      padding: 6px 16px;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    /* Main content */
    .main-content {
      padding: 20px;
    }

    /* Form groups */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #2c4b5c;
    }

    .input-icon {
      position: relative;
    }

    .input-icon i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #98b1c2;
      font-size: 1rem;
    }

    .input-icon input, .input-icon select {
      width: 100%;
      padding: 14px 16px 14px 44px;
      border: 1.5px solid #e2e9f0;
      border-radius: 60px;
      font-size: 0.95rem;
      font-family: 'Poppins', sans-serif;
      background: white;
      cursor: pointer;
    }

    .input-icon input:focus, .input-icon select:focus {
      outline: none;
      border-color: #0f6b7c;
    }

    /* Meter info card */
    .meter-info {
      background: #f8fafd;
      border-radius: 20px;
      padding: 16px;
      margin: 20px 0;
      border: 1px solid #eef2f8;
      display: none;
    }

    .meter-info.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #e2e9f0;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: #6f8f9f;
      font-size: 0.8rem;
    }

    .info-value {
      font-weight: 600;
      color: #1e3b44;
    }

    /* Amount input */
    .amount-input {
      background: #f8fafd;
      border-radius: 20px;
      padding: 16px;
      margin: 20px 0;
    }

    .amount-label {
      font-size: 0.75rem;
      color: #6f8f9f;
      margin-bottom: 8px;
    }

    .amount-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0f6b7c;
    }

    /* Quick amounts */
    .quick-amounts {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .quick-amount {
      background: #eef3fa;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* Saved meters */
    .saved-meters {
      margin: 20px 0;
    }

    .section-subtitle {
      font-size: 0.8rem;
      font-weight: 600;
      color: #2c4b5c;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .meters-list {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .meter-chip {
      background: #f0f4f9;
      padding: 10px 16px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.75rem;
      white-space: nowrap;
      cursor: pointer;
    }

    .meter-chip:active {
      background: #e2eaf1;
    }

    /* Action button */
    .pay-btn {
      background: #0f6b7c;
      width: 100%;
      border: none;
      padding: 16px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.2s;
    }

    .pay-btn:active {
      transform: scale(0.97);
      background: #0c5a68;
    }

    .pay-btn:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    /* Recent payments */
    .recent-payments {
      margin-top: 30px;
    }

    .recent-list {
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid #eef2f7;
      overflow: hidden;
    }

    .recent-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #f0f4f9;
    }

    .recent-left {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .recent-icon {
      width: 36px;
      height: 36px;
      background: #eef3fa;
      border-radius: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f6b7c;
    }

    .recent-detail h4 {
      font-size: 0.8rem;
      font-weight: 600;
    }

    .recent-detail p {
      font-size: 0.65rem;
      color: #6f8e9e;
    }

    .recent-amount {
      font-weight: 700;
      color: #c0392b;
    }

    /* Toast */
    .toast-msg {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2f3a;
      color: white;
      padding: 10px 20px;
      border-radius: 60px;
      font-size: 0.8rem;
      z-index: 1100;
      display: none;
    }

    /* Modal */
    .modal-mask {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-card {
      background: white;
      max-width: 340px;
      width: 85%;
      border-radius: 32px;
      padding: 24px;
    }

    .modal-card h3 {
      margin-bottom: 16px;
    }

    .modal-card input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 60px;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .modal-btn {
      flex: 1;
      background: #0f6b7c;
      border: none;
      color: white;
      padding: 10px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
    }

    .modal-btn.cancel {
      background: #aaa;
    }

    /* Bottom nav */
    .bottom-nav {
      background: #ffffff;
      border-top: 1px solid #eef2f8;
      display: flex;
      justify-content: space-around;
      padding: 12px 20px 20px;
      margin-top: 8px;
    }

    .nav-item {
      text-align: center;
      color: #8ea3b2;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .nav-item i {
      font-size: 1.4rem;
      display: block;
      margin-bottom: 4px;
    }

    .nav-item.active {
      color: #0f6b7c;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <div class="header-top">
      <div class="back-btn" id="backBtn">
        <i class="fas fa-arrow-left"></i>
      </div>
      <h2>Pay Electricity Bill</h2>
    </div>
    <div class="wallet-chip">
      <i class="fas fa-wallet"></i> <span id="walletBalance">₦6,250.00</span>
    </div>
  </div>

  <div class="main-content">
    <!-- DisCo Selection -->
    <div class="form-group">
      <label>Select Electricity Company</label>
      <div class="input-icon">
        <i class="fas fa-bolt"></i>
        <select id="discoSelect">
          <option value="">-- Select DisCo --</option>
          <option value="Ikeja Electric">Ikeja Electric</option>
          <option value="Eko Electric">Eko Electric</option>
          <option value="Abuja Electricity (AEDC)">Abuja Electricity (AEDC)</option>
          <option value="Kano Electricity (KEDCO)">Kano Electricity (KEDCO)</option>
          <option value="Port Harcourt Electricity (PHED)">Port Harcourt Electricity (PHED)</option>
          <option value="Benin Electricity (BEDC)">Benin Electricity (BEDC)</option>
          <option value="Enugu Electricity (EEDC)">Enugu Electricity (EEDC)</option>
          <option value="Ibadan Electricity (IBEDC)">Ibadan Electricity (IBEDC)</option>
          <option value="Jos Electricity (JED)">Jos Electricity (JED)</option>
        </select>
      </div>
    </div>

    <!-- Meter Number Input -->
    <div class="form-group">
      <label>Meter Number</label>
      <div class="input-icon">
        <i class="fas fa-qrcode"></i>
        <input type="text" id="meterNumber" placeholder="Enter 10-11 digit meter number">
      </div>
    </div>

    <!-- Validate Button -->
    <button class="pay-btn" id="validateBtn" style="background: #6f8f9f; margin-top: 0;">
      <i class="fas fa-search"></i> Validate Meter
    </button>

    <!-- Meter Information Card -->
    <div id="meterInfoCard" class="meter-info">
      <div class="info-row">
        <span class="info-label">Customer Name</span>
        <span class="info-value" id="customerName">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">Meter Number</span>
        <span class="info-value" id="displayMeterNumber">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">Address</span>
        <span class="info-value" id="customerAddress">--</span>
      </div>
    </div>

    <!-- Amount Section -->
    <div id="amountSection" style="display: none;">
      <div class="amount-input">
        <div class="amount-label">Amount to Pay</div>
        <div class="amount-value" id="amountDisplay">₦0.00</div>
        <div class="quick-amounts">
          <button class="quick-amount" data-amount="1000">₦1,000</button>
          <button class="quick-amount" data-amount="2000">₦2,000</button>
          <button class="quick-amount" data-amount="5000">₦5,000</button>
          <button class="quick-amount" data-amount="10000">₦10,000</button>
        </div>
      </div>

      <div class="form-group">
        <label>Or enter custom amount</label>
        <div class="input-icon">
          <i class="fas fa-naira-sign"></i>
          <input type="number" id="customAmount" placeholder="Enter amount">
        </div>
      </div>
    </div>

    <!-- Saved Meters -->
    <div class="saved-meters">
      <div class="section-subtitle">
        <span><i class="fas fa-bookmark"></i> Saved Meters</span>
        <span id="addMeterBtn" style="color:#0f6b7c; cursor:pointer;"><i class="fas fa-plus"></i> Save Current</span>
      </div>
      <div class="meters-list" id="savedMetersList"></div>
    </div>

    <!-- Pay Button -->
    <button class="pay-btn" id="payBillBtn" disabled>
      <i class="fas fa-credit-card"></i> Pay Bill
    </button>

    <!-- Recent Payments -->
    <div class="recent-payments">
      <div class="section-subtitle">
        <span><i class="fas fa-history"></i> Recent Payments</span>
      </div>
      <div class="recent-list" id="recentPayments"></div>
    </div>
  </div>

  <!-- Bottom navigation -->
  <div class="bottom-nav">
    <div class="nav-item" data-nav="home"><i class="fas fa-home"></i><span>Home</span></div>
    <div class="nav-item" data-nav="data"><i class="fas fa-tower-cell"></i><span>Data</span></div>
    <div class="nav-item active" data-nav="bills"><i class="fas fa-bolt"></i><span>Bills</span></div>
    <div class="nav-item" data-nav="profile"><i class="fas fa-user"></i><span>Profile</span></div>
  </div>
</div>

<!-- Save Meter Modal -->
<div id="saveMeterModal" class="modal-mask">
  <div class="modal-card">
    <h3><i class="fas fa-save"></i> Save Meter</h3>
    <input type="text" id="saveMeterName" placeholder="Nickname (e.g., Home, Office)">
    <div class="modal-buttons">
      <button class="modal-btn" id="confirmSaveMeterBtn">Save</button>
      <button class="modal-btn cancel" id="closeSaveMeterModal">Cancel</button>
    </div>
  </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
  // Wallet state
  let walletBalance = 6250.00;
  const balanceSpan = document.getElementById('walletBalance');
  
  // Current transaction state
  let currentDisco = '';
  let currentMeterNumber = '';
  let currentCustomerName = '';
  let currentAmount = 0;
  let isVerified = false;
  
  // Saved meters
  let savedMeters = [];
  
  // Recent payments
  let recentPayments = [];
  
  // Load data from localStorage
  if (localStorage.getItem('tdata_savedMeters')) {
    savedMeters = JSON.parse(localStorage.getItem('tdata_savedMeters'));
  }
  if (localStorage.getItem('tdata_electricity_payments')) {
    recentPayments = JSON.parse(localStorage.getItem('tdata_electricity_payments'));
  }
  
  function saveSavedMeters() {
    localStorage.setItem('tdata_savedMeters', JSON.stringify(savedMeters));
  }
  
  function saveRecentPayments() {
    localStorage.setItem('tdata_electricity_payments', JSON.stringify(recentPayments));
  }
  
  function updateBalanceUI() {
    balanceSpan.innerText = `₦${walletBalance.toLocaleString('en-NG', {minimumFractionDigits: 2})}`;
  }
  updateBalanceUI();
  
  function showToast(message, isError = false) {
    const toast = document.getElementById('toastMsg');
    toast.innerText = message;
    toast.style.background = isError ? '#c0392b' : '#1e2f3a';
    toast.style.display = 'block';
    setTimeout(() => {
      toast.style.display = 'none';
    }, 2000);
  }
  
  function deductFromWallet(amount, description) {
    if (walletBalance >= amount) {
      walletBalance -= amount;
      updateBalanceUI();
      return true;
    } else {
      showToast(`❌ Insufficient balance. Please fund wallet.`, true);
      return false;
    }
  }
  
  // Mock validation function
  function validateMeter(disco, meterNumber) {
    return new Promise((resolve) => {
      setTimeout(() => {
        if (meterNumber && meterNumber.length >= 10 && disco) {
          // Mock customer data
          const mockCustomers = {
            'Ikeja Electric': { name: 'Mr. Olu Adeyemi', address: '15 Allen Avenue, Ikeja, Lagos' },
            'Eko Electric': { name: 'Mrs. Funke Okonkwo', address: '22 Marina Road, Lagos Island' },
            'Abuja Electricity (AEDC)': { name: 'Dr. Ibrahim Bello', address: '12 Garki, Abuja' },
            'Kano Electricity (KEDCO)': { name: 'Alhaji Musa Abubakar', address: '5 Bello Road, Kano' }
          };
          const defaultCustomer = { name: 'John Doe', address: 'Customer Address' };
          const customer = mockCustomers[disco] || defaultCustomer;
          resolve({ success: true, name: customer.name, address: customer.address });
        } else {
          resolve({ success: false, message: 'Invalid meter number or DisCo' });
        }
      }, 1000);
    });
  }
  
  // Validate button
  const validateBtn = document.getElementById('validateBtn');
  const meterInfoCard = document.getElementById('meterInfoCard');
  const amountSection = document.getElementById('amountSection');
  const payBtn = document.getElementById('payBillBtn');
  
  validateBtn.addEventListener('click', async () => {
    const disco = document.getElementById('discoSelect').value;
    const meterNumber = document.getElementById('meterNumber').value.trim();
    
    if (!disco) {
      showToast("Please select a DisCo", true);
      return;
    }
    if (!meterNumber) {
      showToast("Please enter meter number", true);
      return;
    }
    
    validateBtn.disabled = true;
    validateBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Validating...';
    
    const result = await validateMeter(disco, meterNumber);
    
    validateBtn.disabled = false;
    validateBtn.innerHTML = '<i class="fas fa-search"></i> Validate Meter';
    
    if (result.success) {
      currentDisco = disco;
      currentMeterNumber = meterNumber;
      currentCustomerName = result.name;
      isVerified = true;
      
      document.getElementById('customerName').innerText = result.name;
      document.getElementById('displayMeterNumber').innerText = meterNumber;
      document.getElementById('customerAddress').innerText = result.address;
      meterInfoCard.classList.add('active');
      amountSection.style.display = 'block';
      
      showToast("Meter validated successfully!");
    } else {
      showToast(result.message, true);
      isVerified = false;
    }
  });
  
  // Amount selection
  const amountDisplay = document.getElementById('amountDisplay');
  const customAmountInput = document.getElementById('customAmount');
  
  function updateAmount(amount) {
    currentAmount = amount;
    amountDisplay.innerText = `₦${amount.toLocaleString()}`;
    payBtn.disabled = false;
  }
  
  document.querySelectorAll('.quick-amount').forEach(btn => {
    btn.addEventListener('click', () => {
      const amount = parseInt(btn.getAttribute('data-amount'));
      updateAmount(amount);
      customAmountInput.value = '';
    });
  });
  
  customAmountInput.addEventListener('input', () => {
    const amount = parseInt(customAmountInput.value);
    if (!isNaN(amount) && amount > 0) {
      updateAmount(amount);
    } else if (customAmountInput.value === '') {
      payBtn.disabled = true;
    }
  });
  
  // Pay bill
  payBtn.addEventListener('click', () => {
    if (!isVerified) {
      showToast("Please validate meter first", true);
      return;
    }
    if (!currentAmount || currentAmount <= 0) {
      showToast("Please enter amount to pay", true);
      return;
    }
    if (currentAmount < 100) {
      showToast("Minimum payment is ₦100", true);
      return;
    }
    
    if (deductFromWallet(currentAmount, `Electricity bill payment - ${currentDisco} (${currentMeterNumber})`)) {
      // Add to recent payments
      const payment = {
        disco: currentDisco,
        meterNumber: currentMeterNumber,
        customerName: currentCustomerName,
        amount: currentAmount,
        date: new Date().toISOString(),
        reference: `TDC-ELEC-${Date.now()}`
      };
      recentPayments.unshift(payment);
      if (recentPayments.length > 5) recentPayments.pop();
      saveRecentPayments();
      renderRecentPayments();
      
      showToast(`✅ Payment of ₦${currentAmount.toLocaleString()} to ${currentDisco} successful!`);
      
      // Reset form
      isVerified = false;
      meterInfoCard.classList.remove('active');
      amountSection.style.display = 'none';
      document.getElementById('meterNumber').value = '';
      document.getElementById('discoSelect').value = '';
      customAmountInput.value = '';
      currentAmount = 0;
      payBtn.disabled = true;
    }
  });
  
  // Render saved meters
  function renderSavedMeters() {
    const container = document.getElementById('savedMetersList');
    container.innerHTML = '';
    savedMeters.forEach(meter => {
      const chip = document.createElement('div');
      chip.className = 'meter-chip';
      chip.innerHTML = `<i class="fas fa-home"></i> ${meter.nickname}`;
      chip.addEventListener('click', () => {
        document.getElementById('discoSelect').value = meter.disco;
        document.getElementById('meterNumber').value = meter.meterNumber;
        showToast(`Loaded ${meter.nickname} meter`, false);
      });
      container.appendChild(chip);
    });
    if (savedMeters.length === 0) {
      container.innerHTML = '<span style="font-size:0.7rem; color:#8ea3b2;">No saved meters</span>';
    }
  }
  
  // Save current meter
  document.getElementById('addMeterBtn').addEventListener('click', () => {
    if (!currentDisco || !currentMeterNumber) {
      showToast("Please validate a meter first", true);
      return;
    }
    document.getElementById('saveMeterModal').style.display = 'flex';
  });
  
  document.getElementById('confirmSaveMeterBtn').addEventListener('click', () => {
    const nickname = document.getElementById('saveMeterName').value.trim();
    if (!nickname) {
      showToast("Please enter a nickname", true);
      return;
    }
    savedMeters.push({
      nickname: nickname,
      disco: currentDisco,
      meterNumber: currentMeterNumber,
      customerName: currentCustomerName
    });
    saveSavedMeters();
    renderSavedMeters();
    document.getElementById('saveMeterModal').style.display = 'none';
    document.getElementById('saveMeterName').value = '';
    showToast("Meter saved successfully!");
  });
  
  // Render recent payments
  function renderRecentPayments() {
    const container = document.getElementById('recentPayments');
    if (recentPayments.length === 0) {
      container.innerHTML = '<div style="padding:20px; text-align:center; color:#8ea3b2;">No recent payments</div>';
      return;
    }
    container.innerHTML = '';
    recentPayments.forEach(payment => {
      const item = document.createElement('div');
      item.className = 'recent-item';
      const date = new Date(payment.date);
      const formattedDate = date.toLocaleDateString('en-GB');
      item.innerHTML = `
        <div class="recent-left">
          <div class="recent-icon"><i class="fas fa-bolt"></i></div>
          <div class="recent-detail">
            <h4>${payment.disco}</h4>
            <p>Meter: ${payment.meterNumber} · ${formattedDate}</p>
          </div>
        </div>
        <div class="recent-amount">-₦${payment.amount.toLocaleString()}</div>
      `;
      container.appendChild(item);
    });
  }
  
  // Close modal
  document.getElementById('closeSaveMeterModal').addEventListener('click', () => {
    document.getElementById('saveMeterModal').style.display = 'none';
  });
  
  // Back button
  document.getElementById('backBtn').addEventListener('click', () => {
    window.location.href = "tdata_homepage.html";
  });
  
  // Bottom navigation
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const dest = item.getAttribute('data-nav');
      if (dest === 'home') window.location.href = "tdata_homepage.html";
      else if (dest === 'data') window.location.href = "tdata_dataplans.html";
      else if (dest === 'bills') showToast("You're already on Bills page", false);
